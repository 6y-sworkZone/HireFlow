<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HireFlow - 招聘管理系统</title>
<link rel="stylesheet" href="/static/app.css">
</head>
<body>
<div id="app">
  <div class="layout">
    <aside class="sidebar">
      <div class="logo">
        <span class="logo-icon">HF</span>
        <span class="logo-text">HireFlow</span>
      </div>
      <nav class="nav-menu">
        <a href="/dashboard" class="nav-item" data-page="dashboard">
          <span class="nav-icon">📊</span> 仪表盘
        </a>
        <a href="/jobs" class="nav-item" data-page="jobs">
          <span class="nav-icon">💼</span> 职位管理
        </a>
        <a href="/candidates" class="nav-item" data-page="candidates">
          <span class="nav-icon">👥</span> 候选人管理
        </a>
        <a href="/workflow" class="nav-item" data-page="workflow">
          <span class="nav-icon">🔄</span> 招聘流程
        </a>
        <a href="/interviews" class="nav-item" data-page="interviews">
          <span class="nav-icon">📅</span> 面试安排
        </a>
        <a href="/offers" class="nav-item" data-page="offers">
          <span class="nav-icon">📄</span> Offer管理
        </a>
        <a href="/analytics" class="nav-item" data-page="analytics">
          <span class="nav-icon">📈</span> 数据分析
        </a>
        <a href="/settings" class="nav-item" data-page="settings">
          <span class="nav-icon">⚙️</span> 系统设置
        </a>
      </nav>
    </aside>
    <main class="main">
      <header class="header">
        <div class="header-left">
          <h1 class="page-title" id="pageTitle">仪表盘</h1>
        </div>
        <div class="header-right">
          <div class="notification-bell" onclick="toggleNotifications()">
            🔔<span class="badge" id="unreadCount" style="display:none">0</span>
          </div>
          <div class="user-info">
            <div class="avatar-circle" id="userAvatar">A</div>
            <div class="user-detail">
              <span class="user-name" id="userName">管理员</span>
              <span class="user-role" id="userRole">admin</span>
            </div>
            <button class="btn-logout" onclick="logout()">退出</button>
          </div>
        </div>
      </header>
      <div class="content" id="content">
      </div>
    </main>
  </div>
</div>

<div id="notificationDropdown" class="notification-dropdown" style="display:none">
  <div class="notification-header">
    <span>通知</span>
    <button onclick="readAllNotifications()" class="link-btn">全部已读</button>
  </div>
  <div id="notificationList" class="notification-list"></div>
</div>

<div id="modal" class="modal" style="display:none">
  <div class="modal-overlay" onclick="closeModal()"></div>
  <div class="modal-content" id="modalContent">
  </div>
</div>

<div id="toast" class="toast" style="display:none"></div>

<script src="/static/app.js"></script>
</body>
</html>
